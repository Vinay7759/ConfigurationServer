spring.application.name=currency-conversion-service

server.port=8005

# =========================
# SPRING BOOT ADMIN
# =========================
spring.boot.admin.client.url=http://localhost:8087

# =========================
# EUREKA CONFIGURATION
# =========================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# =========================
# H2 DATABASE
# =========================
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=vinay@123

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# ZIPKIN
# =========================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=*

# =========================
# CIRCUIT BREAKER
# =========================
resilience4j.circuitbreaker.instances.myCircuitBraker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.myCircuitBraker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.myCircuitBraker.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.myCircuitBraker.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.myCircuitBraker.permitted-number-of-calls-in-half-open-state=5

# =========================
# CUSTOM PROPERTY
# =========================
discount=10
